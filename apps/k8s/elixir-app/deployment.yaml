apiVersion: apps/v1
kind: Deployment
metadata:
  name: elixir-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: elixir-app
  template:
    metadata:
      labels:
        app: elixir-app
    spec:
      containers:
      - name: elixir-app
        image: elixir-app:0.1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: elixir-app
spec:
  selector:
    app: elixir-app
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
