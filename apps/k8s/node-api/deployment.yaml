apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-demo-app
  labels:
    app.kubernetes.io/name: node-demo-app
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: node-demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-demo-app
    spec:
      containers:
        - name: app
          image: node-demo-app:0.1.0
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: node-app-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
