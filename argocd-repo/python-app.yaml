apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lahare-Om/springboot-demo-gitops
    targetRevision: deploy
    path: apps/k8s/python-app
  destination:
    server: https://kubernetes.default.svc
    namespace: springboot-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
