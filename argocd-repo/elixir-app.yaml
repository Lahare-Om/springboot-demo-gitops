apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elixir-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Lahare-Om/springboot-demo-gitops
    targetRevision: deploy
    path: apps/k8s/elixir-app
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
