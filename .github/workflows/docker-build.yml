name: Build Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: deploy

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and Test Application
        run: mvn clean verify

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-demo-app:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-demo-app:${{ github.sha }}

      - name: Switch to deployment branch
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/$DEPLOY_BRANCH; then
            git checkout -B $DEPLOY_BRANCH origin/$DEPLOY_BRANCH
          else
            git checkout -b $DEPLOY_BRANCH
          fi

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/springboot-demo-app:${{ github.sha }}|" k8s/base/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/base/deployment.yaml
          git diff --cached --quiet || git commit -m "Update deployment image to ${{ github.sha }}"

      - name: Push updated manifest
        run: git push origin HEAD:$DEPLOY_BRANCH
